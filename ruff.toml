line-length = 80
target-version = "py312"

[lint]
select = [
    "E",     # pycodestyle
    "F",     # pyflakes
    "B",     # bugbear
    "I",     # isort
    "UP",    # pyupgrade
    "N",     # pep8-naming
    "A",     # flake8-builtins
    "ANN",   # flake8-annotations
    "ASYNC", # flake8-async
    "RUF",   # ruff-specific
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
]
ignore = [
    "E203",   # whitespace before ':'
    "E501",   # line length handled by formatter
    "B008",   # default values in function calls
    "RUF002", # Docstring contains ambiguous `с`
]

[lint.per-file-ignores]
"tests/*" = ["ANN"]

[lint.isort]
known-first-party = ["steam_fetcher"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false